name: Feature Request
description: Suggest a new format, conversion path, or feature
labels: ["enhancement"]
body:
  - type: dropdown
    id: type
    attributes:
      label: Request type
      options:
        - New input/output format
        - New conversion path (existing formats)
        - New CLI option or flag
        - MCP server improvement
        - Desktop app improvement
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case — what are you trying to do that isn't possible today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should it work? Include example commands if relevant.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about or currently use as a workaround.
